# cp env.example .env   # then edit .env with your tokens
# docker compose up -d

services:
  symphony:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: symphony-ruby
    restart: unless-stopped
    command: ["--bot", "discord"]
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SYMPHONY_DRY_RUN_TICKET=${SYMPHONY_DRY_RUN_TICKET:-}
    volumes:
      - ../WORKFLOW.md:/app/WORKFLOW.md:ro
      - workspace-data:/workspace
      # Mount gh CLI config so `gh auth token` works (container runs as root):
      - ${HOME:-~}/.config/gh:/root/.config/gh:ro
      # Mount agent binary and config (uncomment the one you use).
      # Pi:
      # - /usr/local/bin/pi:/usr/local/bin/pi:ro
      # - ~/.pi:/root/.pi:ro
      # - ~/.local/share/mise:/root/.local/share/mise:ro
      # Claude Code:
      # - /usr/local/bin/claude:/usr/local/bin/claude:ro
      # - ~/.claude:/root/.claude:ro
      # Codex:
      # - /usr/local/bin/codex:/usr/local/bin/codex:ro
      # - ~/.codex:/root/.codex:ro

volumes:
  workspace-data:
